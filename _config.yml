title: 毛刚的个人博客
author: 毛刚
email: your-email@example.com
description: 记录学习笔记、技术文章、生活思考
baseurl: ""
url: "https://maogang001.github.io"
github_username: maogang001

# 恢复默认主题并优化样式
theme: minima
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 自定义 minima 主题样式
minima:
  skin: auto # 自动适配深色/浅色模式
  show_excerpts: true # 显示文章摘要
  date_format: "%Y-%m-%d"

# 导航菜单（只保留关键入口，避免混乱）
header_pages:
  - about.md
